<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Login | Blood Bank</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="container" style="max-width: 550px; display: flex; justify-content: center;">
        <div class="glass-card login-card" style="width: 100%; padding: 3rem;">
            <div class="logo-container" style="width: 80px; height: 80px; margin-bottom: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark));">
                <i class="fa-solid fa-hand-holding-heart logo-icon" style="font-size: 2.2rem; color: white;"></i>
            </div>
            <h1 class="title" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Donor <span class="highlight">Login</span></h1>
            <p class="description" style="margin-bottom: 2rem;">เข้าสู่ระบบสำหรับผู้บริจาคโลหิต</p>

            <div id="donorLoginAlert" class="alert"></div>

            <div id="donorLoginSuccess" class="auth-success-output">
                <i class="fa-solid fa-circle-check"></i>
                <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--text-main);">เข้าสู่ระบบสำเร็จ!</h2>
                <div style="background: #fdfbf7; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; margin: 1.5rem 0;">
                    <p style="font-size: 1.25rem; color: var(--text-main); margin-bottom: 0.5rem; font-weight: 600;">ยินดีต้อนรับกลับมา</p>
                    <p style="font-size: 1rem; color: var(--text-muted);">กำลังพาคุณไปยังหน้า Dashboard...</p>
                </div>
                
                <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                    <a href="donor-dashboard.html" class="btn btn-donor" style="display: flex; align-items: center; justify-content: center; padding: 1rem 1.5rem; min-width: auto; height: auto;">
                        <span style="font-size: 1rem; color: white;"><i class="fa-solid fa-arrow-right" style="margin-right: 8px;"></i> ไปยังหน้า Dashboard</span>
                    </a>
                </div>
            </div>

            <form id="donorLoginForm" class="form-container" style="text-align: left;">
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="form-label">รหัสผู้บริจาค (Donor ID)</label>
                    <input type="text" id="donorIdInput" class="form-control" placeholder="DON-XXXXX">
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label">รหัสผ่าน (Password)</label>
                    <input type="password" id="donorPasswordInput" class="form-control" placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-donor" style="width: 100%; max-width: 100%;">
                    <div class="btn-content">
                        <span style="font-size: 1.25rem; color: white;"><i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i>เข้าสู่ระบบ</span>
                    </div>
                </button>

                <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
                    <p style="color: var(--text-muted); font-size: 0.95rem;">
                        ยังไม่มีบัญชีผู้ใช้ใช่หรือไม่? 
                        <a href="donor-registration.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">ลงทะเบียนที่นี่</a>
                    </p>
                </div>
            </form>
        </div>
    </main>

    <script src="../../js/script.js"></script>
</body>
</html>
