<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration | Blood Bank</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="container" style="max-width: 900px;">
        <div class="glass-card registration-card" style="padding: 3rem; text-align: left;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 class="title" style="font-size: 2.5rem;">Donor <span class="highlight">Registration</span></h1>
                <p class="description" style="margin-bottom: 0;">ลงทะเบียนเพื่อเริ่มต้นส่งต่อสายโลหิต</p>
            </div>

            <div id="regAlert" class="alert"></div>

            <div id="regSuccess" class="auth-success-output">
                <i class="fa-solid fa-circle-check"></i>
                <h2 style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--text-main);">ลงทะเบียนสำเร็จ!</h2>
                <p id="regDonorIdOutput" style="font-size: 1.25rem; color: #38a169; font-weight: 600;"></p>
                <div style="text-align: center; margin-top: 2.5rem;">
                    <a href="../../index.html" class="btn btn-donor" style="display: inline-flex; justify-content: center; padding: 1rem 2.5rem; min-width: auto;">
                        <span style="color: white;"><i class="fa-solid fa-home" style="margin-right: 8px;"></i> กลับหน้าหลัก</span>
                    </a>
                </div>
            </div>

            <form id="donorForm" class="form-container">
                <h3 style="color: var(--primary); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0;">ข้อมูลส่วนตัว</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">เลขบัตรประชาชน (13 หลัก)</label>
                        <input type="text" id="regIdCard" class="form-control" placeholder="x-xxxx-xxxxx-xx-x" maxlength="13">
                    </div>
                    <div class="form-group">
                        <label class="form-label">ชื่อ-นามสกุล</label>
                        <input type="text" id="regName" class="form-control" placeholder="ชื่อ นามสกุล">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">เพศ</label>
                        <select id="regGender" class="form-control">
                            <option value="">-- เลือกเพศ --</option>
                            <option value="Male">ชาย</option>
                            <option value="Female">หญิง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">วันเกิด</label>
                        <input type="date" id="regDOB" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">เบอร์โทรศัพท์</label>
                        <input type="tel" id="regPhone" class="form-control" placeholder="08x-xxx-xxxx">
                    </div>
                    <div class="form-group">
                        <label class="form-label">อีเมล</label>
                        <input type="email" id="regEmail" class="form-control" placeholder="example@email.com">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">ที่อยู่</label>
                        <textarea id="regAddress" class="form-control" placeholder="บ้านเลขที่, หมู่, ซอย, ถนน, ตำบล, อำเภอ, จังหวัด, รหัสไปรษณีย์"></textarea>
                    </div>
                </div>

                <h3 style="color: var(--primary); margin: 2rem 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0;">ข้อมูลสุขภาพและการเข้าสู่ระบบ</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">กรุ๊ปเลือด (Blood Group)</label>
                        <select id="regBloodType" class="form-control">
                            <option value="">-- เลือกกรุ๊ปเลือด --</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="AB">AB</option>
                            <option value="O">O</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rh Factor</label>
                        <select id="regRh" class="form-control">
                            <option value="">-- เลือก Rh --</option>
                            <option value="Rh+">Positive (+)</option>
                            <option value="Rh-">Negative (-)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">โรคประจำตัว (หากไม่มี โปรดระบุ "ไม่มี")</label>
                        <input type="text" id="regDisease" class="form-control" placeholder="โปรดระบุโรคประจำตัว">
                    </div>

                    <div class="form-group full-width">
                        <label class="form-label">รหัสผ่านสำหรับเข้าสู่ระบบ (Password)</label>
                        <input type="password" id="regPassword" class="form-control" placeholder="••••••••">
                    </div>

                    <div class="form-group full-width" style="margin-top: 1.5rem;">
                        <button type="submit" class="btn btn-donor" style="width: 100%; max-width: 100%;">
                            <div class="btn-content">
                                <span style="font-size: 1.25rem; color: white;"><i class="fa-solid fa-save" style="margin-right: 10px;"></i>ลงทะเบียน</span>
                            </div>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <script src="../../js/script.js"></script>
</body>
</html>
