<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Profile | Blood Bank</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-droplet" style="color: var(--primary); font-size: 1.5rem; margin-right: 10px;"></i>
                <h2>BloodBank</h2>
                <button class="close-sidebar-btn" id="closeSidebarBtn">&times;</button>
            </div>
            <div class="sidebar-menu">
                <a href="donor-dashboard.html" class="menu-item">
                    <i class="fa-solid fa-border-all"></i> Dashboard
                </a>
                <a href="donation-history.html" class="menu-item">
                    <i class="fa-solid fa-clock-rotate-left"></i> ประวัติการบริจาค
                </a>
                <a href="donor-profile.html" class="menu-item active">
                    <i class="fa-solid fa-user"></i> ข้อมูลส่วนตัว
                </a>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper" id="mainContent">
            <!-- Topbar -->
            <header class="topbar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div style="flex: 1;"></div>
                <div class="user-profile">
                    <div class="user-info">
                        <div class="user-name">คุณเจตนิพัทธ์ ผู้บริจาค</div>
                        <div class="user-id">DON-12345</div>
                    </div>
                    <a href="../../index.html" class="logout-btn">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
                    </a>
                </div>
            </header>

            <!-- Content -->
            <main class="dashboard-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h1 class="page-title" style="margin-bottom: 0;">ข้อมูลส่วนตัว (Profile)</h1>
                    <button id="editProfileBtn" class="btn btn-donor" style="min-width: unset; width: auto; padding: 0.8rem 1.5rem; border-radius: 8px;">
                        <span style="font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-pen"></i> แก้ไขข้อมูล</span>
                    </button>
                </div>

                <div class="stat-card" style="padding: 2.5rem; max-width: 900px;">
                    <form id="profileForm" class="form-container" style="margin-top: 0;">
                        
                        <!-- Alert -->
                        <div id="profileAlert" class="alert alert-success" style="display: none;">บันทึกข้อมูลสำเร็จ!</div>

                        <h3 style="color: var(--primary); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0;">ข้อมูลส่วนตัว</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">รหัสผู้บริจาค (Donor ID)</label>
                                <input type="text" class="form-control" value="DON-12345" disabled style="background: #f7fafc; cursor: not-allowed;">
                            </div>
                            <div class="form-group">
                                <label class="form-label">เลขบัตรประชาชน</label>
                                <input type="text" class="form-control" value="1-2345-67890-12-3" disabled style="background: #f7fafc; cursor: not-allowed;">
                            </div>

                            <div class="form-group">
                                <label class="form-label">ชื่อ-นามสกุล</label>
                                <input type="text" class="form-control profile-input" value="เจตนิพัทธ์ ผู้บริจาค" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">วันเกิด</label>
                                <input type="date" class="form-control" value="1999-05-15" disabled style="background: #f7fafc; cursor: not-allowed;">
                            </div>
                        </div>

                        <h3 style="color: var(--primary); margin: 2rem 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0;">ข้อมูลติดต่อ</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">เบอร์โทรศัพท์</label>
                                <input type="tel" class="form-control profile-input" value="081-234-5678" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">อีเมล</label>
                                <input type="email" class="form-control profile-input" value="donor@example.com" disabled>
                            </div>

                            <div class="form-group full-width">
                                <label class="form-label">ที่อยู่</label>
                                <textarea class="form-control profile-input" disabled>123 ถนนสุขุมวิท เขตวัฒนา กรุงเทพมหานคร 10110</textarea>
                            </div>
                        </div>

                        <h3 style="color: var(--primary); margin: 2rem 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 1px solid #e2e8f0;">ข้อมูลสุขภาพ</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">กรุ๊ปเลือด (Blood Group)</label>
                                <input type="text" class="form-control" value="O" disabled style="background: #f7fafc; cursor: not-allowed; font-weight: bold; color: var(--primary);">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Rh Factor</label>
                                <input type="text" class="form-control" value="Positive (+)" disabled style="background: #f7fafc; cursor: not-allowed; font-weight: bold; color: var(--primary);">
                            </div>

                            <div class="form-group full-width">
                                <label class="form-label">โรคประจำตัว</label>
                                <input type="text" class="form-control profile-input" value="ไม่มี" disabled>
                            </div>

                            <!-- Save Button (hidden initially) -->
                            <div id="saveProfileContainer" class="form-group full-width" style="margin-top: 1.5rem; display: none;">
                                <button type="submit" class="btn btn-donor" style="width: 100%; max-width: 100%;">
                                    <div class="btn-content">
                                        <span style="font-size: 1.25rem; color: white;"><i class="fa-solid fa-save" style="margin-right: 10px;"></i>บันทึกการเปลี่ยนแปลง</span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <script src="../../js/script.js"></script>
    <script>
        // Specific logic for profile page
        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('editProfileBtn');
            const saveContainer = document.getElementById('saveProfileContainer');
            const profileInputs = document.querySelectorAll('.profile-input');
            const profileForm = document.getElementById('profileForm');
            const alertBox = document.getElementById('profileAlert');

            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    // Toggle edit mode
                    const isEditing = saveContainer.style.display === 'block';

                    if (!isEditing) {
                        profileInputs.forEach(input => {
                            input.removeAttribute('disabled');
                            input.style.background = '#fff';
                            input.style.borderColor = 'var(--primary)';
                        });
                        saveContainer.style.display = 'block';
                        editBtn.innerHTML = '<span style="font-size: 1rem; color: #4a5568;"><i class="fa-solid fa-times"></i> ยกเลิก</span>';
                        editBtn.className = 'btn btn-staff';
                        editBtn.style.minWidth = 'unset';
                        editBtn.style.width = 'auto';
                        editBtn.style.padding = '0.8rem 1.5rem';
                        alertBox.style.display = 'none';
                    } else {
                        profileInputs.forEach(input => {
                            input.setAttribute('disabled', 'true');
                            input.style.borderColor = '#e2e8f0';
                        });
                        saveContainer.style.display = 'none';
                        editBtn.innerHTML = '<span style="font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-pen"></i> แก้ไขข้อมูล</span>';
                        editBtn.className = 'btn btn-donor';
                        editBtn.style.minWidth = 'unset';
                        editBtn.style.width = 'auto';
                        editBtn.style.padding = '0.8rem 1.5rem';
                    }
                });
            }

            if (profileForm) {
                profileForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    // Simulate save logic
                    setTimeout(() => {
                        // Switch back to view mode
                        profileInputs.forEach(input => {
                            input.setAttribute('disabled', 'true');
                            input.style.borderColor = '#e2e8f0';
                        });
                        saveContainer.style.display = 'none';
                        editBtn.innerHTML = '<span style="font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px;"><i class="fa-solid fa-pen"></i> แก้ไขข้อมูล</span>';
                        editBtn.className = 'btn btn-donor';
                        editBtn.style.minWidth = 'unset';
                        editBtn.style.width = 'auto';
                        editBtn.style.padding = '0.8rem 1.5rem';

                        // Show success alert
                        alertBox.style.display = 'block';

                        // Optional ripple effect inside timeout
                    }, 500);
                });
            }
        });
    </script>
</body>
</html>
